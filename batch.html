<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Batch ZIP Processor - Instructor Tool</title>
        <link rel="stylesheet" href="styles.css" />
        <link rel="stylesheet" href="batch-styles.css" />
    </head>
    <body>
        <nav class="navigation">
            <a href="index.html">Student Verifier</a>
            <a href="batch.html" class="active">Batch Processor</a>
        </nav>

        <h1>📚 Batch ZIP Processor - Instructor Tool</h1>

        <!-- Upload Section -->
        <div class="container">
            <div class="upload-section">
                <h2>📁 Upload Bulk Submissions</h2>
                <p>Upload a ZIP file containing multiple student submissions (ZIP of ZIPs)</p>

                <form id="bulkSubmitFile">
                    <div class="file-input-wrapper">
                        <input type="file" id="bulkFileInput" name="bulkFileInput" accept=".zip" class="file-input" />
                        <button type="submit" class="upload-btn" id="bulkUploadBtn">Process Bulk Submissions</button>
                    </div>
                </form>

                <div class="loading" id="bulkLoading">📖 Processing bulk submissions...</div>

                <div id="bulkErrorMessage"></div>
                <div id="bulkSuccessMessage"></div>
            </div>
        </div>

        <!-- Progress Section -->
        <div class="container batch-progress" id="batchProgressContainer">
            <h2>🔄 Processing Progress</h2>
            <div id="batchProgress"></div>
        </div>

        <!-- Results Section -->
        <div class="container batch-results" id="batchResultsContainer">
            <h2>📊 Batch Results</h2>
            <div class="results-summary" id="resultsSummary"></div>
            <div class="results-actions">
                <button id="exportCSV" class="btn btn-primary" disabled>Export CSV</button>
                <button id="exportJSON" class="btn btn-secondary" disabled>Export JSON</button>
            </div>
            <div id="detailedResults"></div>
        </div>

        <!-- File Content Display Section -->
        <div class="container file-content-section" id="fileContentSection" style="display: none">
            <div class="file-content-header">
                <h3>📂 File Structure</h3>
                <button id="backToResultsBtn" class="btn btn-secondary btn--small">↑ Back to Results</button>
            </div>
            <div class="file-content" id="fileContent">
                <div class="file-tree" id="fileTree"></div>

                <div class="file-content-display">
                    <div class="content-header" id="contentHeader"></div>
                    <div class="content-body" id="contentBody"></div>
                </div>
            </div>
        </div>

        <!-- Templates -->
        <template id="message-template">
            <div class="message"></div>
        </template>

        <template id="progress-dashboard-template">
            <div class="progress-dashboard">
                <div class="overall-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text">
                        <span id="progressText">0 / 0</span>
                        <span class="progress-percentage" id="progressPercentage">0%</span>
                    </div>
                </div>
                <div class="status-counts">
                    <span class="status-item completed">✅ <span id="completedCount">0</span></span>
                    <span class="status-item failed">❌ <span id="failedCount">0</span></span>
                    <span class="status-item processing">⏳ <span id="processingCount">0</span></span>
                    <span class="status-item remaining">📋 <span id="remainingCount">0</span></span>
                </div>
                <div class="student-progress-list" id="studentProgressList"></div>
            </div>
        </template>

        <template id="student-progress-item-template">
            <div class="student-progress-item">
                <div class="student-info" data-student-id="">
                    <span class="student-name"></span>
                    <span class="student-status"></span>
                    <div class="student-actions">
                        <button class="expand-btn" data-expanded="false">
                            <span class="expand-icon">▶</span>
                            <span class="expand-text">Details</span>
                        </button>
                    </div>
                </div>
                <div class="student-summary"></div>
                <div class="student-detailed-results" style="display: none"></div>
            </div>
        </template>

        <template id="results-summary-template">
            <div class="summary-stats">
                <h3>📈 Summary Statistics</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">Total Submissions</span>
                        <span class="stat-value" id="totalSubmissions">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Successful</span>
                        <span class="stat-value success" id="successfulSubmissions">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Failed</span>
                        <span class="stat-value failed" id="failedSubmissions">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Average Score</span>
                        <span class="stat-value" id="averageScore">0%</span>
                    </div>
                </div>
            </div>
        </template>

        <template id="loading-status-template">
            <p class="loading-status"></p>
        </template>

        <template id="detailed-results-template">
            <div class="detailed-results">
                <h4 class="results-header">Question Results</h4>
                <div class="question-results" id="questionResults"></div>
            </div>
        </template>

        <template id="question-result-template">
            <div class="question-result">
                <div class="question-header">
                    <span class="question-name"></span>
                    <div class="question-header-actions">
                        <span class="question-score"></span>
                        <button class="view-question-code-btn" data-question="">
                            <span>👁️ See Code</span>
                        </button>
                    </div>
                </div>
                <div class="question-file-viewer" style="display: none">
                    <h5>📄 Code for this question</h5>
                    <div class="question-file-content-display">
                        <div class="content-header"></div>
                        <div class="content-body"></div>
                    </div>
                </div>
                <div class="test-cases-summary">
                    <span class="passed-tests"></span>
                    <span class="failed-tests"></span>
                </div>
                <div class="question-error" style="display: none"></div>
                <div class="test-case-details" id="testCaseDetails"></div>
            </div>
        </template>

        <template id="test-case-template">
            <div class="test-case"></div>
        </template>

        <template id="test-case-details-template">
            <div class="test-case test-case--details">
                <div class="test-input"><strong>Input:</strong> <code class="input-value"></code></div>
                <div class="test-expected"><strong>Expected:</strong> <code class="expected-value"></code></div>
                <div class="test-output"><strong>Your output:</strong> <code class="output-value"></code></div>
            </div>
        </template>

        <!-- File Viewing Templates -->
        <template id="file-item-template">
            <div class="file-item">
                <span class="file-icon"></span>
                <span class="file-name"></span>
                <span class="file-date"></span>
                <span class="file-size"></span>
                <div class="file-actions">
                    <button class="btn btn--view">View</button>
                    <button class="btn btn--download">Download</button>
                </div>
            </div>
        </template>

        <template id="binary-file-content-template">
            <div class="binary-file-notice">
                <p>Binary file (.<span class="file-type"></span>) - Download to view</p>
            </div>
        </template>

        <!-- Scripts -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

        <!-- Syntax Highlighting -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

        <!-- Core Infrastructure -->
        <script src="js/config/app-config.js"></script>
        <script src="js/utils/dom-utils.js"></script>
        <script src="js/services/notification-service.js"></script>
        <script src="js/base/base-upload-handler.js"></script>
        <script src="js/services/test-runner-service.js"></script>
        <script src="js/core/dependency-container.js"></script>

        <!-- Existing Modules -->
        <script src="js/ui-utils.js"></script>
        <script src="js/file-utils.js"></script>
        <script src="js/console-manager.js"></script>
        <script src="js/test-executor.js"></script>
        <script src="js/assignment-grader.js"></script>
        <script src="js/batch-processor.js"></script>
        <script src="js/services/progress-manager.js"></script>
        <script src="js/services/results-exporter.js"></script>
        <script src="js/batch-upload-handler.js"></script>
    </body>
</html>
